<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - ServiMarket Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f23;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        .header h1 { font-size: 2em; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        
        /* Tarjetas de métricas */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h3 { font-size: 14px; opacity: 0.7; margin-bottom: 10px; }
        .card .valor { font-size: 48px; font-weight: bold; margin-bottom: 5px; }
        .card .unidad { font-size: 14px; opacity: 0.6; }
        
        /* Gráficos */
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
        }
        .chart-container h3 { margin-bottom: 15px; font-size: 18px; }
        
        /* Tablas */
        .table-container {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th { color: #667eea; font-weight: 600; }
        tr:hover { background: rgba(255,255,255,0.05); }
        
        /* Barra de navegación */
        .nav {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav button {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav button:hover, .nav button.active {
            background: #667eea;
        }
        
        .premium-badge {
            background: #ffc107;
            color: #333;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        
        footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            opacity: 0.6;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 ServiMarket Analytics</h1>
            <p>Panel de control - Métricas en tiempo real</p>
        </div>
        
        <div class="nav">
            <button onclick="cargarResumen()" class="active">📈 Resumen</button>
            <button onclick="cargarUsuarios()">👥 Usuarios</button>
            <button onclick="cargarServicios()">🛒 Servicios</button>
            <button onclick="window.location.href='/'">🔙 Volver a la tienda</button>
        </div>
        
        <div id="dashboard-content">
            <!-- Las tarjetas se cargarán aquí -->
            <div style="text-align: center; padding: 50px;">Cargando datos...</div>
        </div>
        
        <footer>
            <p>Actualización automática cada 30 segundos | ServiMarket Analytics</p>
        </footer>
    </div>

    <script>
        // Detectar automáticamente si estamos en producción o local
        const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:5000'
            : 'https://servimarket.onrender.com';
        
        let charts = {};
        
        async function cargarResumen() {
            try {
                const respuesta = await fetch(`${API_URL}/api/analytics/resumen`);
                const data = await respuesta.json();
                
                const html = `
                    <div class="cards">
                        <div class="card">
                            <h3>👥 Usuarios totales</h3>
                            <div class="valor">${data.total_usuarios}</div>
                            <div class="unidad">registrados</div>
                        </div>
                        <div class="card">
                            <h3>🛒 Servicios publicados</h3>
                            <div class="valor">${data.total_servicios}</div>
                            <div class="unidad">en total</div>
                        </div>
                        <div class="card">
                            <h3>⭐ Usuarios Premium</h3>
                            <div class="valor">${data.usuarios_premium}</div>
                            <div class="unidad">${data.porcentaje_premium}% del total</div>
                        </div>
                        <div class="card">
                            <h3>💰 Precio promedio</h3>
                            <div class="valor">$${data.precio_promedio}</div>
                            <div class="unidad">por servicio</div>
                        </div>
                    </div>
                    
                    <div class="charts">
                        <div class="chart-container">
                            <h3>📈 Servicios publicados por día</h3>
                            <canvas id="chart-servicios"></canvas>
                        </div>
                        <div class="chart-container">
                            <h3>👤 Usuarios registrados por día</h3>
                            <canvas id="chart-usuarios"></canvas>
                        </div>
                    </div>
                    
                    <div class="table-container">
                        <h3>🏆 Top 5 Vendedores</h3>
                        <table>
                            <thead>
                                <tr><th>Vendedor</th><th>Servicios publicados</th></tr>
                            </thead>
                            <tbody>
                                ${data.top_vendedores.map(v => `<tr><td>${v.nombre}</td><td>${v.total}</td></tr>`).join('')}
                                ${data.top_vendedores.length === 0 ? '<tr><td colspan="2">No hay datos aún</td></tr>' : ''}
                            </tbody>
                        </table>
                    </div>
                `;
                
                document.getElementById('dashboard-content').innerHTML = html;
                
                // Crear gráficos
                crearGrafico('chart-servicios', data.servicios_por_dia);
                crearGrafico('chart-usuarios', data.usuarios_por_dia);
                
            } catch (error) {
                document.getElementById('dashboard-content').innerHTML = 
                    '<div style="text-align:center;padding:50px;color:red">Error al cargar datos. ¿El servidor está funcionando?</div>';
                console.error('Error:', error);
            }
        }
        
        function crearGrafico(canvasId, data) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }
            
            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.fecha),
                    datasets: [{
                        label: 'Cantidad',
                        data: data.map(d => d.count),
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.1)' } }
                    }
                }
            });
        }
        
        async function cargarUsuarios() {
            try {
                const respuesta = await fetch(`${API_URL}/api/analytics/usuarios`);
                const usuarios = await respuesta.json();
                
                const html = `
                    <div class="table-container">
                        <h3>👥 Lista de usuarios</h3>
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Premium</th><th>Servicios</th><th>Fecha registro</th></tr>
                            </thead>
                            <tbody>
                                ${usuarios.map(u => `
                                    <tr>
                                        <td>${u.id}</td>
                                        <td>${u.nombre}</td>
                                        <td>${u.email}</td>
                                        <td>${u.es_premium ? '<span class="premium-badge">⭐ Premium</span>' : 'Gratuito'}</td>
                                        <td>${u.total_servicios}</td>
                                        <td>${u.fecha_registro}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                
                document.getElementById('dashboard-content').innerHTML = html;
            } catch (error) {
                document.getElementById('dashboard-content').innerHTML = '<div style="text-align:center;padding:50px;color:red">Error al cargar usuarios</div>';
            }
        }
        
        async function cargarServicios() {
            try {
                const respuesta = await fetch(`${API_URL}/api/analytics/servicios`);
                const servicios = await respuesta.json();
                
                const html = `
                    <div class="table-container">
                        <h3>🛒 Lista de servicios</h3>
                        <table>
                            <thead>
                                <tr><th>ID</th><th>Título</th><th>Precio</th><th>Vendedor</th><th>Fecha publicación</th></tr>
                            </thead>
                            <tbody>
                                ${servicios.map(s => `
                                    <tr>
                                        <td>${s.id}</td>
                                        <td>${s.titulo}</td>
                                        <td>$${s.precio}</td>
                                        <td>${s.vendedor}</td>
                                        <td>${s.fecha}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
                
                document.getElementById('dashboard-content').innerHTML = html;
            } catch (error) {
                document.getElementById('dashboard-content').innerHTML = '<div style="text-align:center;padding:50px;color:red">Error al cargar servicios</div>';
            }
        }
        
        // Auto-refrescar cada 30 segundos si estamos en resumen
        setInterval(() => {
            if (document.querySelector('.nav button.active')?.innerText.includes('Resumen')) {
                cargarResumen();
            }
        }, 30000);
        
        cargarResumen();
    </script>
</body>
</html>
